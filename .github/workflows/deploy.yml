name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish
        run: dotnet publish -c Release --no-build -o ./publish

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Stop service
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.SERVER_HOST }} \
            "systemctl stop apex-api || true"

      - name: Upload files
        run: |
          scp -i ~/.ssh/id_ed25519 -r ./publish/* \
            root@${{ secrets.SERVER_HOST }}:/var/www/apex/api/

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.SERVER_HOST }} bash -s << 'EOF'
            set -e
            export PATH="$PATH:$HOME/.dotnet/tools"

            dotnet tool install --global dotnet-ef --version "6.*" 2>/dev/null || true

            cd /var/www/ApexecProject
            git fetch origin main
            git reset --hard origin/main

            dotnet ef database update \
              --connection "Server=Localhost,1433;Database=ApexDbContext;User Id=SA;Password=reallyStrongPwd123;TrustServerCertificate=True;" \
              2>&1 | tee /tmp/migration.log || true

            echo "--- Migration log ---"
            cat /tmp/migration.log
          EOF

      - name: Start service
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.SERVER_HOST }} \
            "systemctl start apex-api && sleep 3 && systemctl status apex-api --no-pager"

      - name: Health check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.apexec.az/swagger/index.html)
          echo "Health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy xetasi: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy ugurla tamamlandi!"
