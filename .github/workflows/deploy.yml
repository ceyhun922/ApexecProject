name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            cd /var/www/ApexecProject &&
            git pull origin main &&
            dotnet publish ApexWebAPI.csproj -c Release -o /var/www/apexapi &&
            dotnet tool install --global dotnet-ef --version 6.* 2>/dev/null || true &&
            export PATH=\"\$PATH:\$HOME/.dotnet/tools\" &&
            dotnet ef database update --project ApexWebAPI.csproj --connection '${{ secrets.PRODUCTION_DB_CONNECTION }}' &&
            systemctl restart apex-api
          "
